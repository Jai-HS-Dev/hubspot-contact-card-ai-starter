name: AI starter checks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: AI readiness check
        run: npm run check:ai

      - name: Example syntax check
        working-directory: examples/contact-card-with-agent-tool
        run: npm run check

      - name: Smoke example
        run: npm run smoke:example