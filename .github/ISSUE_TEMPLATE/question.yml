name: Question
description: Ask a question about using this contact-card starter.
title: "[Question]: "
labels: ["question"]
body:
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I confirm this issue does not include API keys, OAuth secrets, tokens, portal IDs, customer data, or private screenshots.
          required: true
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What are you trying to understand or build?
    validations:
      required: true

